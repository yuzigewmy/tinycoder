<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">TinyCoder Agent Architecture</title>
  <desc id="desc">A layered architecture diagram showing the TinyCoder terminal UI, agent loop, model router, tools, permissions, sessions, context compaction, MCP, skills, and external systems.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .lane-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #111827; }
      .box-title { font: 700 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .box-text { font: 400 13px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #64748b; }
      .lane { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .ui { fill: #fff7ed; stroke: #fdba74; }
      .core { fill: #eef6ff; stroke: #93c5fd; }
      .model { fill: #f5f3ff; stroke: #c4b5fd; }
      .tool { fill: #ecfdf5; stroke: #86efac; }
      .memory { fill: #fdf2f8; stroke: #f9a8d4; }
      .external { fill: #f1f5f9; stroke: #94a3b8; }
      .line { fill: none; stroke: #374151; stroke-width: 1.7; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text x="56" y="58" class="title">TinyCoder Agent Architecture</text>
  <text x="56" y="86" class="subtitle">Terminal-first coding agent with model routing, guarded tools, persistent sessions, MCP, and skills.</text>

  <rect x="42" y="124" width="238" height="542" class="lane"/>
  <text x="64" y="156" class="lane-title">User Interface</text>
  <rect x="68" y="184" width="186" height="78" class="box ui"/>
  <text x="90" y="214" class="box-title">User Terminal</text>
  <text x="90" y="238" class="box-text">TTY input/output</text>
  <rect x="68" y="300" width="186" height="106" class="box ui"/>
  <text x="90" y="330" class="box-title">tty_app.py</text>
  <text x="90" y="354" class="box-text">slash commands</text>
  <text x="90" y="374" class="box-text">history, picker, view</text>
  <rect x="68" y="444" width="186" height="92" class="box ui"/>
  <text x="90" y="474" class="box-title">index.py</text>
  <text x="90" y="498" class="box-text">CLI bootstrap</text>
  <text x="90" y="518" class="box-text">runtime wiring</text>
  <text x="68" y="614" class="small">Ctrl+C interrupts streaming</text>
  <text x="68" y="636" class="small">Thinking/progress is hidden</text>

  <rect x="318" y="124" width="270" height="542" class="lane"/>
  <text x="340" y="156" class="lane-title">Agent Core</text>
  <rect x="346" y="184" width="214" height="86" class="box core"/>
  <text x="370" y="216" class="box-title">prompt.py</text>
  <text x="370" y="240" class="box-text">system prompt builder</text>
  <rect x="346" y="310" width="214" height="112" class="box core"/>
  <text x="370" y="342" class="box-title">agent_loop.py</text>
  <text x="370" y="366" class="box-text">model/tool loop</text>
  <text x="370" y="386" class="box-text">stream handling</text>
  <text x="370" y="406" class="box-text">self-recovery path</text>
  <rect x="346" y="462" width="214" height="94" class="box core"/>
  <text x="370" y="494" class="box-title">config.py</text>
  <text x="370" y="518" class="box-text">settings merge</text>
  <text x="370" y="538" class="box-text">runtime config</text>

  <rect x="626" y="124" width="250" height="542" class="lane"/>
  <text x="648" y="156" class="lane-title">Models</text>
  <rect x="654" y="184" width="194" height="96" class="box model"/>
  <text x="680" y="216" class="box-title">ModelRouter</text>
  <text x="680" y="240" class="box-text">provider selection</text>
  <text x="680" y="260" class="box-text">runtime switching</text>
  <rect x="654" y="324" width="194" height="62" class="box model"/>
  <text x="680" y="360" class="box-title">Anthropic Adapter</text>
  <rect x="654" y="414" width="194" height="76" class="box model"/>
  <text x="680" y="448" class="box-title">OpenAI-compatible</text>
  <text x="680" y="470" class="box-text">Qwen / custom</text>
  <rect x="654" y="518" width="194" height="62" class="box model"/>
  <text x="680" y="554" class="box-title">Mock Adapter</text>
  <text x="654" y="636" class="small">Custom providers are persisted</text>

  <rect x="914" y="124" width="324" height="250" class="lane"/>
  <text x="936" y="156" class="lane-title">Tools &amp; Permissions</text>
  <rect x="940" y="184" width="130" height="76" class="box tool"/>
  <text x="962" y="216" class="box-title">ToolRegistry</text>
  <text x="962" y="240" class="box-text">dispatch</text>
  <rect x="1084" y="184" width="126" height="76" class="box tool"/>
  <text x="1101" y="216" class="box-title">Built-in Tools</text>
  <text x="1101" y="240" class="box-text">files, grep, cmd</text>
  <rect x="940" y="292" width="270" height="56" class="box tool"/>
  <text x="962" y="326" class="box-title">PermissionManager gates edits, paths, and commands</text>

  <rect x="914" y="414" width="324" height="252" class="lane"/>
  <text x="936" y="446" class="lane-title">Memory &amp; Extensions</text>
  <rect x="940" y="474" width="126" height="72" class="box memory"/>
  <text x="964" y="504" class="box-title">Sessions</text>
  <text x="964" y="526" class="box-text">resume/view</text>
  <rect x="1084" y="474" width="126" height="72" class="box memory"/>
  <text x="1112" y="504" class="box-title">History</text>
  <text x="1112" y="526" class="box-text">commands</text>
  <rect x="940" y="574" width="126" height="62" class="box memory"/>
  <text x="966" y="610" class="box-title">MCP</text>
  <rect x="1084" y="574" width="126" height="62" class="box memory"/>
  <text x="1112" y="610" class="box-title">Skills</text>

  <rect x="358" y="688" width="552" height="48" class="box external"/>
  <text x="382" y="718" class="box-title">External Systems: local filesystem, shell commands, model APIs, MCP servers</text>

  <path d="M 161 262 L 161 300" class="line"/>
  <path d="M 254 352 C 290 352 300 352 346 352" class="line"/>
  <path d="M 454 270 L 454 310" class="line"/>
  <path d="M 560 366 C 592 366 606 232 654 232" class="line"/>
  <path d="M 848 232 C 886 232 900 222 940 222" class="line"/>
  <path d="M 1070 222 L 1084 222" class="line"/>
  <path d="M 1044 260 L 1044 292" class="line"/>
  <path d="M 454 422 L 454 462" class="line-soft"/>
  <path d="M 560 512 C 680 626 808 510 940 510" class="line-soft"/>
  <path d="M 560 376 C 700 650 802 605 940 605" class="line-soft"/>
  <path d="M 751 280 L 751 324" class="line"/>
  <path d="M 751 386 L 751 414" class="line"/>
  <path d="M 751 490 L 751 518" class="line"/>
  <path d="M 1075 636 C 1048 684 1000 710 910 712" class="line-soft"/>
  <path d="M 1004 348 C 936 416 914 614 910 712" class="line-soft"/>
  <path d="M 453 556 C 453 650 470 690 520 688" class="line-soft"/>
</svg>
